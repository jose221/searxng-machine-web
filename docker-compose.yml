    networks:
      - scraping_network
    ports:
      - "8123:8080"
    environment:
      # --- SERVER CONFIG ---
      - SEARXNG_SETTINGS={"use_default_settings":true,"server":{"base_url":"http://84.247.137.97:8123/","secret_key":"Gonzales2026_Key_Secure","image_proxy":true},"search":{"formats":["html","json"]},"engines":[{"name":"wikidata","disabled":true},{"name":"ahmia","disabled":true},{"name":"torch","disabled":true}],"valkey":{"url":"redis://:Gonzales220@84.247.137.97:6379/0"}}
      
