    networks:
      - coolify # <-- ESTO ES LO QUE FALTA
    environment:
      - SEARXNG_SETTINGS_PATH=/opt/searxng_config/settings.yml
      # Usamos la base de datos 1 para no ensuciar tu producción
      - SEARXNG_VALKEY_URL=redis://:Gonzales220@redis_production:6379/1
      - SEARXNG_BASE_URL=http://84.247.137.97:8123/
      - SEARXNG_SECRET_KEY=Gonzales2026_Key_Secure
    restart: always

# Le decimos a Docker que esta red ya existe y Coolify la maneja
networks:
  coolify:
    external: true
