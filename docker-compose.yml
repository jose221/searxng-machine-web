services:
  # PROXY MANAGER: Montado y listo para cuando lo necesites
  privoxy:
    image: vimagick/privoxy
    container_name: privoxy-manager
    restart: always
    networks:
      - coolify
    # El puerto 8118 queda interno, pero puedes exponerlo si quieres probarlo desde tu Mac
    # ports:
    #   - "8118:8118"
    volumes:
      - ./privoxy/config:/etc/privoxy/config:ro
  # MOTOR 1: SearXNG (Optimizado para JSON e IA)
  searxng:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: searxng-core
    restart: always
    ports:
      - "8123:8080"
    networks:
      - coolify
    environment:
      - SEARXNG_VALKEY_URL=redis://:Gonzales220@84.247.137.97:6379/1
      - SEARXNG_REDIS_URL=redis://:Gonzales220@84.247.137.97:6379/1

  # MOTOR 2: Whoogle (Privacidad y Estabilidad via Tor)
  whoogle-search:
    image: benbusby/whoogle-search:latest
    container_name: whoogle-search
    restart: always
    ports:
      - "8124:5000"
    networks:
      - coolify
    environment:
      - WHOOGLE_CONFIG_GET_ONLY=1
      - WHOOGLE_CONFIG_THEME=dark
      - WHOOGLE_CONFIG_ALTS=1
      - WHOOGLE_CONFIG_LANGUAGE=es
      - WHOOGLE_CONFIG_COUNTRY=MX
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  coolify:
    external: true
