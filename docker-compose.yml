name: searxng

services:
  core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:latest
    restart: always
    ports:
      - "8123:8080"
    networks:
      - coolify
    environment:
      # Variables de entorno estándar oficiales
      - SEARXNG_BASE_URL=http://84.247.137.97:8123/
      - SEARXNG_SECRET_KEY=Gonzales2026_Key_Secure
      - SEARXNG_VALKEY_URL=redis://:Gonzales220@redis_production:6379/1
      - SEARXNG_REDIS_URL=redis://:Gonzales220@redis_production:6379/1
    volumes:
      # El flag :Z es crítico para evitar el PermissionError en entornos estrictos
      - ./core-config/:/etc/searxng/:Z
      # Volumen administrado por Docker para la caché temporal de los workers
      - core-data:/var/cache/searxng/

volumes:
  core-data:

networks:
  coolify:
    external: true
